{% extends "base.html" %}
{% load widget_tweaks %}
{% block page_title %}Trip Feedback{% endblock %}
{% block content %}
<section class="card">
    <h3>Rate Your Trip</h3>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {% render_field field %}
            </div>
        {% endfor %}
        <button class="button" type="submit">Send Feedback</button>
    </form>
</section>
{% endblock %}
